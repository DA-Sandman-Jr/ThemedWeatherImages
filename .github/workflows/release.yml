name: Release to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    # Trusted Publishing: no long-lived API key. The job's OIDC token is
    # exchanged for a one-hour nuget.org API key against the trusted publishing
    # policy configured on nuget.org (repository owner DA-Sandman-Jr,
    # repository ThemedWeatherImages, workflow file release.yml).
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '8.0.x'

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore ThemedWeatherImages.sln

      - name: Build
        run: dotnet build ThemedWeatherImages.sln --configuration Release --no-restore -p:Version="$VERSION"

      - name: Test
        run: dotnet test ThemedWeatherImages.sln --configuration Release --no-build --verbosity minimal

      - name: Pack
        run: dotnet pack ThemedWeatherImages.sln --configuration Release --no-build -p:Version="$VERSION" --output ./nupkgs

      # Request the temp key right before the push; it expires after an hour.
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push packages to nuget.org
        run: |
          dotnet nuget push "nupkgs/*.nupkg" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
